version: '3.8'

services:

  db:
    image: postgres:15
    container_name: stealth_garage_db
    environment:
      POSTGRES_DB: stealth_garage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - stealth-network

  api:
    build: .
    container_name: stealth_garage_api
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - stealth-network

networks:
  stealth-network:
    driver: bridge